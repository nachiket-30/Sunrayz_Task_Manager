<!DOCTYPE html>
<html>
<head>
    <title>Employee Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2>Welcome {{ employee_name }}</h2>

    <table class="table table-bordered table-hover mt-4">

        <thead class="table-dark">

            <tr>
                <th>Title</th>
                <th>Description</th>
                <th>Status</th>
                <th>Priority</th>
                <th>Due Date</th>
                <th>Action</th>
            </tr>

        </thead>

        <tbody>

        {% for task in tasks %}

        <tr>

            <td>{{ task[1] }}</td>
            <td>{{ task[2] }}</td>
            <td>{{ task[3] }}</td>
            <td>{{ task[4] }}</td>
            <td>{{ task[5] }}</td>

            <td>
                <a href="/update_task/{{ task[0] }}"
                   class="btn btn-warning btn-sm">
                    Update
                </a>
            </td>

        </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
