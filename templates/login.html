<!DOCTYPE html>
<html>
<head>
    <title>Sunrayz Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#0d6efd,#6f42c1);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:450px;
            padding:30px;
            border-radius:15px;
            background:white;
            box-shadow:0px 5px 20px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
        }
    </style>

</head>
<body>

<div class="login-card">

    <h2>Sunrayz Technology</h2>

    <form method="POST">

    <div class="mb-3">
        <label>Email</label>
        <input type="email"
               name="email"
               class="form-control"
               required>
    </div>

    <div class="mb-3">
        <label>Password</label>
        <input type="password"
               name="password"
               class="form-control"
               required>
    </div>

    <button type="submit"
            class="btn btn-primary w-100">
        Login
    </button>

</form>

</div>

</body>
</html>
