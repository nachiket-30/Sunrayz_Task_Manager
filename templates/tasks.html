<!DOCTYPE html>
<html>
<head>

    <title>All Tasks</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">All Assigned Tasks</h2>
    <form method="GET" action="/tasks" class="mb-4">

    <div class="input-group">

        <input
            type="text"
            name="search"
            class="form-control"
            placeholder="Search Task, Employee or Status"
            value="{{ request.args.get('search','') }}">

        <button class="btn btn-primary">
            Search
        </button>

        <a href="/tasks" class="btn btn-secondary">
            Reset
        </a>

    </div>

    </form>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

            <tr>

                <th>ID</th>
                <th>Task</th>
                <th>Employee</th>
                <th>Status</th>
                <th>Priority</th>
                <th>Due Date</th>
                <th>Action</th>

            </tr>

        </thead>

        <tbody>

        {% for task in tasks %}

        <tr>

            <td>{{ task[0] }}</td>
            <td>{{ task[1] }}</td>
            <td>{{ task[2] }}</td>
            <td>{{ task[3] }}</td>
            <td>{{ task[4] }}</td>
            <td>{{ task[5] }}</td>

            <td>

                <a href="/edit_task/{{ task[0] }}"
                   class="btn btn-warning btn-sm">
                    Edit
                </a>

                <a href="/delete_task/{{ task[0] }}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this task?')">
                    Delete
                </a>

            </td>

        </tr>

        {% endfor %}
        {% if tasks|length == 0 %}

        <tr>

            <td colspan="7" class="text-center text-danger">

                <strong>No Task Found</strong>

            </td>

        </tr>

        {% endif %}

        </tbody>

    </table>

</div>

</body>
</html>
