<!DOCTYPE html>
<html>
<head>
    <title>Edit Client</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h2 class="mb-4">Edit Client</h2>

        <form method="POST">

            <div class="mb-3">
                <label>Client Name</label>
                <input type="text" name="client_name"
                       value="{{ client[1] }}"
                       class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Company Name</label>
                <input type="text" name="company_name"
                       value="{{ client[2] }}"
                       class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email"
                       value="{{ client[3] }}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Phone</label>
                <input type="text" name="phone"
                       value="{{ client[4] }}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Project Name</label>
                <input type="text" name="project_name"
                       value="{{ client[5] }}"
                       class="form-control">
            </div>

            <div class="mb-3">

                <label>Status</label>

                <select name="status" class="form-control">

                    <option {% if client[6]=="Active" %}selected{% endif %}>Active</option>

                    <option {% if client[6]=="Completed" %}selected{% endif %}>Completed</option>

                    <option {% if client[6]=="On Hold" %}selected{% endif %}>On Hold</option>

                </select>

            </div>

            <button class="btn btn-success w-100">
                Update Client
            </button>

        </form>

    </div>

</div>

</body>
</html>
