<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2>Edit Task</h2>

<form method="POST">

<div class="mb-3">
<label>Title</label>

<input
type="text"
name="title"
class="form-control"
value="{{ task[1] }}"
required>

</div>

<div class="mb-3">

<label>Description</label>

<textarea
name="description"
class="form-control"
required>{{ task[2] }}</textarea>

</div>

<div class="mb-3">

<label>Priority</label>

<select
name="priority"
class="form-control">

<option {% if task[5]=='High' %}selected{% endif %}>High</option>

<option {% if task[5]=='Medium' %}selected{% endif %}>Medium</option>

<option {% if task[5]=='Low' %}selected{% endif %}>Low</option>

</select>

</div>

<div class="mb-3">

<label>Due Date</label>

<input
type="date"
name="due_date"
class="form-control"
value="{{ task[6] }}">

</div>

<div class="mb-3">

<label>Status</label>

<select
name="status"
class="form-control">

<option {% if task[4]=='Pending' %}selected{% endif %}>Pending</option>

<option {% if task[4]=='In Progress' %}selected{% endif %}>In Progress</option>

<option {% if task[4]=='Completed' %}selected{% endif %}>Completed</option>

</select>

</div>

<button class="btn btn-success w-100">

Update Task

</button>

</form>

</div>

</div>

</body>
</html>
