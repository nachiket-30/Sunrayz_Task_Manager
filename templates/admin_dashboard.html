<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">
        Welcome Admin
    </h1>

    <div class="row">

        <div class="col-md-4">
            <div class="card p-3">
                <h3>Total Employees</h3>
                <p>{{ employee_count }}</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h3>Total Tasks</h3>
                <p>{{ task_count }}</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h3>Pending Tasks</h3>
                <p>{{ pending_count }}</p>
            </div>
        </div>

    </div>

    <div class="mt-4">

        <a href="/add_employee" class="btn btn-primary">
            Add Employee
        </a>
        <a href="/employees" class="btn btn-info">
            View Employees
        </a>

        <a href="/assign_task" class="btn btn-success">
            Assign Task
        </a>

        <a href="/tasks" class="btn btn-secondary">
            View Tasks
        </a>

        <a href="/tasks" class="btn btn-secondary">
            Manage Tasks
        </a>

        <a href="/add_client" class="btn btn-info">
            Add Client
        </a>

        <a href="/clients" class="btn btn-dark">
            View Clients
        </a>

        <<a href="/logout" class="btn btn-danger float-end">
            Logout
        </a>

    </div>

</div>

</body>
</html>
