<!DOCTYPE html>
<html>
<head>

    <title>Clients</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">
        All Clients
    </h2>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

            <tr>

                <th>ID</th>
                <th>Client</th>
                <th>Company</th>
                <th>Project</th>
                <th>Status</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Action</th>

            </tr>

        </thead>

        <tbody>

        {% for client in clients %}

        <tr>

            <td>{{ client[0] }}</td>
            <td>{{ client[1] }}</td>
            <td>{{ client[2] }}</td>
            <td>{{ client[5] }}</td>
            <td>{{ client[6] }}</td>
            <td>{{ client[3] }}</td>
            <td>{{ client[4] }}</td>

            <td>

                <a href="/edit_client/{{ client[0] }}"
                class="btn btn-warning btn-sm">

                    Edit

                </a>

                <a href="/delete_client/{{ client[0] }}"
                class="btn btn-danger btn-sm"
                onclick="return confirm('Are you sure you want to delete this client?')">

                    Delete
                    
                </a>

            </td>

        </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
